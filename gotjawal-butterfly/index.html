<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>곶자왈 나비 게임 (준비 중)</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    min-height: 100vh;
    font-family: "Apple SD Gothic Neo", "Malgun Gothic", "Noto Sans KR", sans-serif;
    background: linear-gradient(160deg, #fff7e6, #ffe9c7);
    color: #3a2410;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    text-align: center; padding: 40px 20px;
  }
  .emoji { font-size: 80px; margin-bottom: 16px; }
  h1 { font-size: clamp(24px, 5vw, 40px); color: #b34700; margin-bottom: 10px; }
  p { color: #8a6a3a; font-size: clamp(14px, 2.5vw, 18px); margin-bottom: 28px; }
  a { display: inline-block; background: #2f9e44; color: #fff; font-weight: 700;
      text-decoration: none; padding: 12px 24px; border-radius: 999px; }
</style>
</head>
<body>
  <div class="emoji">🦋🌸🌳</div>
  <h1>곶자왈 나비 게임</h1>
  <p>이 게임은 지금 준비 중이에요. 곧 만나요!</p>
  <a href="../">← 게임 목록으로 돌아가기</a>
</body>
</html>
